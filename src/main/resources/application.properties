spring.config.import=optional:file:.env

# Application name
spring.application.name=tnal_youth_backend

# Database connection
#spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
#spring.datasource.username=${POSTGRES_USER}
#spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.url=jdbc:postgresql://localhost:5432/thnal_youth_db
spring.datasource.username=postgres
spring.datasource.password=12345

spring.security.user.name=admin
spring.security.user.password=admin123



# JSON naming strategy
spring.jackson.property-naming-strategy=SNAKE_CASE

# SQL initialization
spring.sql.init.mode=never

# JWT configuration
jwt.secret=TNAL_YOUTH_SUPER_SECRET_KEY_CHANGE_ME_123456789
jwt.access-expiration=86400000
jwt.refresh-expiration=604800000
jwt.issuer=tnal-youth-backend
jwt.audience=tnal-youth-client

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Hibernate validation
spring.jpa.hibernate.ddl-auto=validate

# Logging
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=DEBUG

# Disable Docker Compose integration
spring.docker.compose.enabled=false
