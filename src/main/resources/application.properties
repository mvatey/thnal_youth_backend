spring.application.name=thnal_youth_backend

spring.config.import=optional:file:${user.dir}/.env[.properties]

spring.docker.compose.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5433/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=8081

spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}
jwt.issuer=${JWT_ISSUER}
jwt.audience=${JWT_AUDIENCE}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration



# ============================================================
# EMAIL OTP
# ============================================================

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Prevent requests from hanging too long
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM}

# ============================================================
# PLASGATE SMS
# ============================================================

plasgate.base-url=${PLASGATE_BASE_URL}
plasgate.private-key=${PLASGATE_PRIVATE_KEY}
plasgate.secret-key=${PLASGATE_SECRET_KEY}
plasgate.sender=${PLASGATE_SENDER}



